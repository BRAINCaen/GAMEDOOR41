<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" preserveAspectRatio="xMidYMid meet">
  <title>GAMEDOOR·41 — YouTube Banner (2560×1440)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;900&amp;display=swap');
    </style>
    <radialGradient id="ytBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0d08"/>
      <stop offset="100%" stop-color="#0C0800"/>
    </radialGradient>
  </defs>
  <rect width="2560" height="1440" fill="url(#ytBg)"/>

  <!-- Giant background 41 -->
  <text x="2560" y="1540" text-anchor="end" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-weight="900" font-size="1400" fill="#E07020" opacity="0.04" letter-spacing="-40">41</text>

  <!-- Kicker -->
  <text x="1280" y="588" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="32" fill="#E07020" letter-spacing="16">41 BIS RUE PASTEUR · CAEN</text>

  <!-- Main logo with circle -->
  <g font-family="'Barlow Condensed', 'Arial Narrow', 'Arial', sans-serif">
    <text x="1260" y="780" text-anchor="end" font-size="220" letter-spacing="-4">
      <tspan font-weight="900" fill="#F0EBE2">GAME</tspan><tspan font-weight="300" fill="#F0EBE2">DOOR</tspan>
    </text>
    <circle cx="1325" cy="720" r="22" fill="#E07020"/>
    <text x="1370" y="780" font-size="220" font-weight="900" fill="#E07020" letter-spacing="-4">41</text>
  </g>

  <!-- Tagline -->
  <text x="1280" y="850" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="40" fill="#C8C2B8" letter-spacing="8">L'ENDROIT OÙ ON JOUE</text>

  <!-- Separator -->
  <line x1="1180" y1="890" x2="1380" y2="890" stroke="#E07020" stroke-width="2"/>

  <!-- Sub-tagline -->
  <text x="1280" y="940" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="30" fill="#8A8078" letter-spacing="6">ESCAPE GAME · QUIZ GAME · ACTION GAME</text>
</svg>
