<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" preserveAspectRatio="xMidYMid meet">
  <title>GAMEDOOR·41 — YouTube Banner (2560×1440)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;900&amp;display=swap');
    </style>
    <radialGradient id="ytBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0d08"/>
      <stop offset="100%" stop-color="#0C0800"/>
    </radialGradient>
    <linearGradient id="orangeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E07020"/>
      <stop offset="100%" stop-color="#FF8A3D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#ytBg)"/>

  <!-- Decorative dotted grid -->
  <g opacity="0.1" fill="#E07020">
    <circle cx="200" cy="200" r="2"/>
    <circle cx="400" cy="200" r="2"/>
    <circle cx="600" cy="200" r="2"/>
    <circle cx="200" cy="400" r="2"/>
    <circle cx="2360" cy="200" r="2"/>
    <circle cx="2160" cy="200" r="2"/>
    <circle cx="2360" cy="1240" r="2"/>
  </g>

  <!-- Giant background "41" -->
  <text x="2560" y="1540" text-anchor="end" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-weight="900" font-size="1400" fill="#E07020" opacity="0.04" letter-spacing="-40">41</text>

  <!-- Safe area zone (centered 1546×423 at 507,508) -->
  <!-- Kicker -->
  <text x="1280" y="588" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="32" fill="#E07020" letter-spacing="16">41 BIS RUE PASTEUR · CAEN</text>

  <!-- Main logo -->
  <g font-family="'Barlow Condensed', 'Arial Narrow', sans-serif">
    <text x="1280" y="760" text-anchor="middle" font-size="220" letter-spacing="-4">
      <tspan font-weight="900" fill="#F0EBE2">GAME</tspan><tspan font-weight="300" fill="#F0EBE2">DOOR</tspan><tspan dx="20" font-weight="900" fill="#E07020">·41</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="1280" y="830" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="40" fill="#C8C2B8" letter-spacing="8">L'ENDROIT OÙ ON JOUE</text>

  <!-- Separator -->
  <line x1="1180" y1="870" x2="1380" y2="870" stroke="#E07020" stroke-width="2"/>

  <!-- Sub-tagline -->
  <text x="1280" y="920" text-anchor="middle" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="30" fill="#8A8078" letter-spacing="6">ESCAPE GAME · QUIZ GAME · ACTION GAME</text>

</svg>
