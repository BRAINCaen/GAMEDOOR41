<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624" preserveAspectRatio="xMidYMid meet">
  <title>GAMEDOOR·41 — Facebook Cover (1640×624)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;900&amp;display=swap');
    </style>
    <linearGradient id="fbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0800"/>
      <stop offset="100%" stop-color="#1a0d08"/>
    </linearGradient>
  </defs>

  <rect width="1640" height="624" fill="url(#fbBg)"/>

  <!-- Giant 41 watermark -->
  <text x="1640" y="760" text-anchor="end" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-weight="900" font-size="820" fill="#E07020" opacity="0.05" letter-spacing="-25">41</text>

  <!-- Left kicker -->
  <text x="120" y="170" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="26" fill="#E07020" letter-spacing="10">ANCIENNEMENT BRAIN ESCAPE GAME &amp; BUZZ YOUR BRAIN</text>

  <!-- Main logo -->
  <g font-family="'Barlow Condensed', 'Arial Narrow', sans-serif">
    <text x="120" y="340" font-size="160" letter-spacing="-4">
      <tspan font-weight="900" fill="#F0EBE2">GAME</tspan><tspan font-weight="300" fill="#F0EBE2">DOOR</tspan><tspan dx="15" font-weight="900" fill="#E07020">·41</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="120" y="400" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="40" fill="#C8C2B8" letter-spacing="4">L'ENDROIT OÙ ON JOUE À CAEN</text>

  <!-- Separator -->
  <line x1="120" y1="440" x2="350" y2="440" stroke="#E07020" stroke-width="2"/>

  <!-- Services -->
  <text x="120" y="490" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="28" fill="#8A8078" letter-spacing="6">ESCAPE GAME · QUIZ GAME · ACTION GAME</text>

  <!-- Address -->
  <text x="120" y="540" font-family="'Barlow Condensed', 'Arial', sans-serif" font-weight="500" font-size="22" fill="#8A8078" letter-spacing="4">41 BIS RUE PASTEUR · 14120 MONDEVILLE · 02 31 53 07 51</text>

</svg>
