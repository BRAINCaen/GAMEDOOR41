name: Update Google reviews

on:
  schedule:
    # 03:00 UTC = 04:00 ou 05:00 heure française selon DST — hors heures d'affluence
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch reviews and update HTML
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/update-google-reviews.mjs

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — rating/count unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          RATING=$(node -e "console.log(require('./data/google-reviews.json').rating)")
          COUNT=$(node -e "console.log(require('./data/google-reviews.json').reviewCount)")
          git commit -m "chore(reviews): sync Google rating ${RATING} / ${COUNT} avis"
          git push
